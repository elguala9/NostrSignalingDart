name: nostr_signaling
version: 0.3.0
description: >-
  Nostr-based signaling library for Dart enabling arbitrary data
  exchange between peers with optional GZip compression and
  multi-relay redundancy.
homepage: https://github.com/elguala9/NostrSignalingDart
repository: https://github.com/elguala9/NostrSignalingDart
issue_tracker: https://github.com/elguala9/NostrSignalingDart/issues
documentation: https://github.com/elguala9/NostrSignalingDart/tree/main/packages/nostr_signaling#readme
funding:
  - https://github.com/sponsors/elguala9

topics:
  - nostr
  - signaling
  - compression
  - p2p
  - decentralized

environment:
  sdk: '^3.11.0'

resolution: workspace

dependencies:
  archive: ^4.0.9
  crypto: ^3.0.7
  dart_nostr: ^10.0.1
  convert: ^3.1.0
  singleton_manager: ^0.6.1
  work_db: ^1.3.0

  meta: ^1.18.2
dev_dependencies:
  test: ^1.31.1
  lints: ^4.0.0
